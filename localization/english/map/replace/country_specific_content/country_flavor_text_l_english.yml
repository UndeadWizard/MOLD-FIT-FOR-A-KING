l_english:
 GBR_FLAVOR_TEXT:0 "Great Britain has roared into the 19th century, rapidly becoming the world's first industrial nation. The massive empire is kept afloat by the labor of colonies across the globe. However, King William IV is close to death and who knows what sort of era the next monarch will usher in."

 USA_FLAVOR_TEXT:1 "After the Seven Years' War, George Washington secured greater self-governance for Britain's American colonies, forging a lasting bond between the North American Union and Great Britain. With the British outlawing slavery throughout the empire and tensions growing worldwide, will British dominion in America hold?"
 QUE_FLAVOR_TEXT:0 "Once the proud heartland of New France, Lower Canada has been systematically hollowed out and transformed in the wake of the [concept_grand_derangement]. The vibrant French-Canadien community that once lined the St. Lawrence River has vanished, replaced by an industrialized Anglo-Protestant landscape sculpted by aggressive British merchants."
 LOU_FLAVOR_TEXT:0 "After decades of the [concept_great_insult], Louisiane is now engulfed in fierce rebellion against the Spanish Crown. Driven by the wealthy Creole elite and bolstered by anti-British French exiles, this powerful merchant alliance aims to break Madrid's monopoly and seize absolute control of the vital Mississippi River highway. Will they prevail or find themselves crushed under a Spanish heel?"