l_english:
 je_cajun_rebellion:0 "Great Cajun Rebellion"
 je_cajun_rebellion_reason:0 "The Creole of Louisiane rise against the Spanish, no longer willing to tolerate their [concept_great_insult]. The memory of 1768, when our forebears rose in defiance against Spanish oppression, has led to this moment. The spirit of resistance awakens once more, a fire lit anew in our hearts. Now is the time for liberation, a new Creole nation."

 je_group_john_brant:0 "Horns of John Brant"
 je_john_brant_rule:0 "The Horns of John Brant"
 je_john_brant_rule_reason:0 "Four years ago, Isaac Brant's tyranny came to a bloody end. Blinded by British gold and alcohol, Isaac attempted to rule the League as an absolute Autocrat - intimidating the Longhouse with a personal militia of young, radicalized warriors. After enduring his iron grip for twenty long years, a traditionalist faction led by his half-brother, John Brant, launched a coup, assassinating the tyrant and reclaiming the Great Law of Peace. Taking up the mantle of [concept_grand_hoyaneh], John now rules with a singular focus: to reconcile the fractured clans.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Reformer Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_lax_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag] has #b not#! enacted [GetLawType('law_hereditary_bureaucrats').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag] has #v 3#! [Concept('concept_state', '$concept_states$')] with a level #v 3#! [GetBuildingType('building_urban_center').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] The [concept_clout] of the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group] is #v 10#! or above\n#tooltippable;tooltip:tenpo_hardliner_tt #b Hardliner Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_strict_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_shinsengumi').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag] has #v 40#! levels of [GetBuildingType('building_rice_farm').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] The [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group] is [concept_marginalized]\n#tooltippable;tooltip:tenpo_shared_tt #b Shared Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b No#! owned [GetCulture('').GetName] [concept_homeland] [concept_state] is suffering from [concept_famine]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag] has a [Concept('concept_gdp', '$concept_gdp_short$')] of @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! or above\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] [ROOT.GetCountry.GetAdjectiveNoFlag] army [concept_power_projection] is greater than #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] We have #v 10#! or more levels of [GetBuildingType('building_naval_fortification').GetName] in owned [Concept('concept_state', '$concept_states$')]"
 je_brant_crisis_success_tt:0 "We have completed at least #v 8#! agenda goals"
 je_brant_crisis_success_2_tt:0 "Depending on the number of #tooltippable;tooltip:tenpo_shared_tt #b Shared#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b Reformer#!#!, or #tooltippable;tooltip:tenpo_hardliner_tt #b Hardliner#!#! goals completed, the reward will change"