l_english:
 je_texas_lou:0 "Great Cajun Rebellion"
 je_texas_lou_reason:0 "The Creole of Louisiane rise against the Spanish, no longer willing to tolerate their [concept_great_insult]. The memory of 1768, when our forebears rose in defiance against Spanish oppression, has led to this moment. The spirit of resistance awakens once more, a fire lit anew in our hearts. Now is the time for liberation, a new Creole nation."