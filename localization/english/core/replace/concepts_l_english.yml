l_english:

 concept_great_insult: "Gran Enzultasyon"
 concept_great_insult_desc: "As the Spanish Empire grew more unstable, there was a growing demand among the Spanish Elite to curb rebellious tendencies within the Americas and other Spanish colonies. This led to strict policies of hispanization; particularly within the Louisiana territories.\n\nMany of these policies mandated the strict use of Spanish within Louisiana courts, religious education taught solely in Spanish, and the requirement for all business to go through a Spanish intermediary. The Creole Elites within Nouvelle-Orléans began calling these acts #white Gran Enzultasyon#! or #white The Great Insult. #!"
