l_english:

 concept_great_insult: "Gran Enzultasyon"
 concept_great_insult_desc: "As the Spanish Empire grew more unstable at the turn of the century, there was a growing demand amongst the Spanish elite to curb rebellious tendencies within the Americas and other Spanish colonies. This led to aggressive policies of Hispanization, particularly within the Louisiana territories.\n\nMany of these policies mandated the strict use of Spanish within Louisiana courts, religious education taught solely in Spanish, and the requirement for all businesses to go through a Spanish intermediary. The Creole elites within Nouvelle-Orléans began calling these acts #white Gran Enzultasyon#! or #white The Great Insult. #!"
 concept_grand_derangement: "Grand Dérangement"
 concept_grand_derangement_desc: "Though beginning in 1755 against the Acadians present in Nova Scotia, New Brunswick, and Prince Edward Island during the Seven Years' War, the Grand Dérangement quickly evolved into discriminatory measures against the French Canadiens as English merchants began to establish themselves in Quebec.\n\nMany would end up following their Acadian cousins south to the Louisiana colonies, west to settle Métis lands, or to other French colonies."
 concept_grand_hoyaneh: "Grand Hoyaneh"
 concept_grand_hoyaneh_desc: "A title created in 1778 by the British Empire, it serves as the official head of state responsible for signing treaties and serving as 'Speaker of the Longhouse' to the Governor-General and the NAU Parliament. Though officially chosen by the Council of Clan Mothers, it is heavily implied by British diplomats that a choice should be amendable to the Crown.\n\nThe first Grand Hoyaneh was Joseph Brant, whose natural ability, education and embracement of numerous aspects of European culture made him the obvious choice of leader. However, the establishment of the Grand Hoyaneh title is commonly held as the end of the [concept_covenant_chain]."
 concept_covenant_chain: "Covenant Chain"
 concept_covenant_chain_desc: "A series of alliances and treaties developed during the seventeenth century, primarily between the Haudenosaunee and the British North American colonies. They sought to address issues of colonial settlement and suppress violence between the colonists and Indigenous to preserve trade.\n\nAfter the establishment of the North American Union, this relationship shifted as growing Iroquois dependence on British goods, British political dominance over the French, and colonial restlessness over the Royal Proclamation of 1763. The establishment of the Covenant Prince system uplifted the British into the role of 'Fathers' over their Iroquois 'Children' demanding subservience instead of the equal partners they were under the Covenant Chain."
 concept_imperial_estate: "Imperial Estate"
 concept_imperial_estate_desc: "Imperial Estates are semi-autonomous territories within the Holy Roman Empire, each governed by its own ruler but owing allegiance to the Emperor. These states enjoy significant self-governance while participating in the Empire's complex political and legal framework."
